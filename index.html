<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>단어 찾기</title>
<style>
  :root { --cell: 40px; --gap: 4px; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    background: linear-gradient(160deg, #1b2735 0%, #090a0f 100%);
    color: #f0f0f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 10px 36px;
    user-select: none;
  }
  h1 { font-size: 23px; margin: 2px 0; letter-spacing: 1px; }
  .sub { font-size: 12.5px; color: #8b9bb4; margin-bottom: 12px; text-align: center; }

  /* 점수판 */
  .scorebar {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 12px;
    background: #2a3647; padding: 9px 22px; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35); position: relative;
  }
  .stat { display: flex; flex-direction: column; align-items: center; min-width: 52px; }
  .stat .lbl { font-size: 10.5px; color: #8b9bb4; letter-spacing: .5px; }
  .stat .val { font-size: 25px; font-weight: 700; color: #ffd166; font-variant-numeric: tabular-nums; }
  .stat.best .val { color: #06d6a0; font-size: 20px; }
  .combo {
    font-size: 15px; font-weight: 700; color: #ff6b6b;
    min-width: 70px; text-align: center; opacity: 0; transition: opacity .15s;
  }
  .combo.on { opacity: 1; animation: pop .3s; }
  @keyframes pop { 0%{transform:scale(.6);} 60%{transform:scale(1.25);} 100%{transform:scale(1);} }

  .toast {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    font-size: 22px; font-weight: 800; color: #ffd166;
    text-shadow: 0 2px 6px rgba(0,0,0,.6); pointer-events: none; opacity: 0; white-space: nowrap;
  }
  .toast.fly { animation: fly .9s ease-out; }
  @keyframes fly {
    0%{opacity:0; transform:translate(-50%,6px) scale(.7);}
    20%{opacity:1; transform:translate(-50%,-8px) scale(1.1);}
    100%{opacity:0; transform:translate(-50%,-48px) scale(1);}
  }

  /* 레벨 선택 */
  .levels { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 480px; margin-bottom: 12px; max-height: 132px; overflow-y: auto; padding: 4px; }
  .lv {
    width: 30px; height: 30px; border-radius: 7px; border: 1px solid #46566f;
    background: #313e52; color: #c8d2e4; font-size: 13px; font-weight: 600; cursor: pointer; flex: 0 0 auto;
  }
  .lv.active { background: #ffd166; color: #1b2735; border-color: #ffd166; }
  .lv.cleared { border-color: #06d6a0; color: #06d6a0; }
  .lv.active.cleared { background: #ffd166; color: #1b2735; }

  /* 보드 */
  .board {
    display: grid; gap: var(--gap); background: #2a3647; padding: var(--gap);
    border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.45); touch-action: none;
  }
  .board.miss { animation: shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
  .cell {
    width: var(--cell); height: var(--cell);
    display: flex; align-items: center; justify-content: center;
    background: #f4f6fb; color: #1b2735;
    font-size: calc(var(--cell) * 0.46); font-weight: 600; border-radius: 7px;
    transition: background .08s, color .08s, transform .08s;
  }
  .cell.sel { background: #ffd166; color: #1b2735; transform: scale(1.05); }
  .cell.found { background: #06d6a0; color: #fff; }

  /* 단어 목록 */
  .words { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 480px; margin-top: 16px; }
  .word { background: #313e52; border: 1px solid #46566f; padding: 5px 11px; border-radius: 18px; font-size: 14px; transition: all .15s; }
  .word.done { background: #06d6a0; border-color: #06d6a0; color: #fff; text-decoration: line-through; opacity: .8; }

  .bar { margin-top: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button {
    background: #ffd166; color: #1b2735; border: none; padding: 9px 16px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.alt { background: #313e52; color: #f0f0f5; border: 1px solid #46566f; }
  button:active { transform: translateY(1px); }
  .status { font-size: 13px; color: #8b9bb4; }

  .win {
    position: fixed; inset: 0; background: rgba(9,10,15,.88);
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 10; padding: 20px;
  }
  .win.show { display: flex; }
  .win h2 { font-size: 38px; margin: 0; }
  .win .fs { font-size: 18px; color: #ffd166; }
  .win .row { display: flex; gap: 12px; }

  /* 가로(landscape)·세로 높이가 짧은 화면: 보드 위 요소를 줄여 보드가 세로로 넘치지 않게 */
  @media (orientation: landscape) and (max-height: 560px) {
    body { padding-top: 6px; }
    h1 { font-size: 17px; }
    .sub { display: none; }
    .scorebar { margin-bottom: 7px; padding: 6px 16px; }
    .levels { max-height: 66px; margin-bottom: 7px; }
    .words { margin-top: 8px; }
    .bar { margin-top: 8px; }
  }
</style>
</head>
<body>
  <h1 id="title">🔤 단어 찾기</h1>
  <div id="sub" class="sub"></div>

  <div class="scorebar">
    <div class="stat"><span id="lbl-score" class="lbl">점수</span><span id="score" class="val">0</span></div>
    <div id="combo" class="combo"></div>
    <div class="stat best"><span id="lbl-best" class="lbl">최고</span><span id="best" class="val">0</span></div>
    <div id="toast" class="toast"></div>
  </div>

  <div id="levels" class="levels"></div>

  <div id="board" class="board"></div>

  <div class="bar">
    <span id="status" class="status"></span>
    <button id="lang" class="alt">🌐 English</button>
    <button id="newgame">새 게임</button>
  </div>

  <div id="words" class="words"></div>

  <div id="win" class="win">
    <h2 id="win-title">🎉 클리어!</h2>
    <div id="win-score" class="fs"></div>
    <div class="row">
      <button id="again" class="alt">다시 하기</button>
      <button id="next">다음 레벨 →</button>
    </div>
  </div>

const TOTAL_LEVELS = 50;
const DIR = { H:{dr:0,dc:1}, V:{dr:1,dc:0}, D1:{dr:1,dc:1}, D2:{dr:-1,dc:1} };

let lang = "ko";
let level = 1;             // 1..50
let WORDS = [];            // 이번 게임에 실제 배치된 단어들
let SIZE = 8, DIRS = [];
let grid, placed, foundSet, selecting, startCell, curCells;
let score, combo, best;

const $ = id => document.getElementById(id);
const boardEl=$("board"), wordsEl=$("words"), levelsEl=$("levels"),
      statusEl=$("status"), winEl=$("win"), toastEl=$("toast");

function rnd(n){ return Math.floor(Math.random()*n); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sizeFor(lv){ return Math.min(8 + Math.floor((lv-1)/4), 16); }
function wordCountFor(lv){ return Math.min(6 + Math.floor((lv-1)/4), 14); }
function dirsFor(lv){
  if(lv<=6) return [DIR.H, DIR.V];
  if(lv<=18) return [DIR.H, DIR.V, DIR.D1];
  return [DIR.H, DIR.V, DIR.D1, DIR.D2];
}

/* ===== localStorage 안전 래퍼 ===== */
function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
function bestKey(){ return `wf_best_${lang}_${level}`; }
function clearedKey(lv){ return `wf_cleared_${lang}_${lv}`; }
function readBest(){ const v=parseInt(lsGet(bestKey()),10); return Number.isFinite(v)?v:0; }

/* ===== 게임 생성 ===== */
function newGame(){
  SIZE = sizeFor(level);
  DIRS = dirsFor(level);
  // 레벨 단어 풀(중복 제거, 격자에 들어가는 길이만)에서 매 게임 랜덤 부분집합을 뽑아 배치
  // → 같은 레벨이라도 게임마다 다른 단어가 출제됨
  const pool = [...new Set(WORDS_DATA[lang][level-1])].filter(w => w.length <= SIZE);
  const want = Math.min(wordCountFor(level), pool.length);
  const source = shuffle(pool.slice()).slice(0, want);

  // 한 단어라도 못 넣으면 보드를 비우고 다시 시도해 선택된 단어가 모두 나오도록 보장
  for(let attempt=0; attempt<16; attempt++){
    grid = Array.from({length:SIZE}, ()=> Array(SIZE).fill(null));
    placed = [];
    for(const word of source){
      for(let tries=0; tries<800; tries++){
        const {dr,dc} = DIRS[rnd(DIRS.length)];
        const len = word.length;
        const rMin = dr < 0 ? len-1 : 0;
        const rMax = dr > 0 ? SIZE-len : SIZE-1;
        const cMax = dc > 0 ? SIZE-len : SIZE-1;
        const r = rMin + rnd(rMax - rMin + 1);
        const c = rnd(cMax + 1);
        let fits = true;
        for(let i=0;i<len;i++){
          const rr=r+dr*i, cc=c+dc*i;
          if(grid[rr][cc]!==null && grid[rr][cc]!==word[i]){ fits=false; break; }
        }
        if(!fits) continue;
        for(let i=0;i<len;i++) grid[r+dr*i][c+dc*i] = word[i];
        placed.push({word, r, c, dr, dc, len});
        break;
      }
    }
    if(placed.length === source.length) break;
  }
  if(placed.length < source.length)
    console.warn(`배치 실패: 레벨 ${level}에서 ${source.length - placed.length}개 단어를 넣지 못했습니다`);
  WORDS = placed.map(p=>p.word);

  // 채움 글자: 이번 게임 단어의 음절도 후보에 포함해 한글 보드에서도 정답이 도드라지지 않게 위장
  let f = FILLER[lang];
  if(lang === "ko") f = [...new Set((FILLER.ko + WORDS.join("")).split(""))].join("");
  for(let r=0;r<SIZE;r++)
    for(let c=0;c<SIZE;c++)
      if(grid[r][c]===null) grid[r][c] = f[rnd(f.length)];

  foundSet = new Set();
  score = 0; combo = 0;
  best = readBest();
  render();
}

/* ===== 렌더 ===== */
function setCellSize(){
  const gap = 4;
  // 가로 예산: 화면 너비 기준(여백 16, 최대 470)
  const availW = Math.min(window.innerWidth - 16, 470);
  const cellByW = Math.floor((availW - (SIZE+1)*gap) / SIZE);
  // 세로 예산: 보드 위 크롬(제목·점수판·레벨목록) 높이와 아래 컨트롤 여유분을 빼서
  // 가로 모드/낮은 화면에서도 보드가 세로로 넘치지 않게 함
  const aboveH = boardEl.getBoundingClientRect().top + window.scrollY;
  const availH = window.innerHeight - aboveH - 110;
  const cellByH = Math.floor((availH - (SIZE+1)*gap) / SIZE);
  const px = Math.max(14, Math.min(46, Math.min(cellByW, cellByH)));
  document.documentElement.style.setProperty("--cell", px+"px");
}

function render(){
  boardEl.style.gridTemplateColumns = `repeat(${SIZE}, var(--cell))`;
  boardEl.innerHTML = "";
  for(let r=0;r<SIZE;r++)
    for(let c=0;c<SIZE;c++){
      const d=document.createElement("div");
      d.className="cell"; d.dataset.r=r; d.dataset.c=c; d.textContent=grid[r][c];
      boardEl.appendChild(d);
    }
  wordsEl.innerHTML="";
  for(const w of WORDS){
    const s=document.createElement("span");
    s.className="word"; s.dataset.word=w; s.textContent=w;
    wordsEl.appendChild(s);
  }
  renderLevels();
  setCellSize();   // 크롬(레벨목록 등) 렌더 후 측정해야 보드 높이가 정확
  markFound();
  updateScore();
  updateStatus();
  winEl.classList.remove("show");
}

function renderLevels(){
  levelsEl.innerHTML="";
  for(let lv=1; lv<=TOTAL_LEVELS; lv++){
    const b=document.createElement("button");
    b.className="lv" + (lv===level?" active":"") + (lsGet(clearedKey(lv))?" cleared":"");
    b.textContent=lv;
    b.addEventListener("click", ()=>{ level=lv; newGame(); });
    levelsEl.appendChild(b);
  }
  const a=levelsEl.querySelector(".lv.active");
  if(a) levelsEl.scrollTop = Math.max(0, a.offsetTop - levelsEl.clientHeight/2 + a.offsetHeight/2);
}

function cellAt(r,c){ return boardEl.children[r*SIZE + c]; }
function getCellFromPoint(x,y){
  const el=document.elementFromPoint(x,y);
  return (el && el.classList.contains("cell")) ? el : null;
}

function lineCells(start,end){
  const r1=+start.dataset.r, c1=+start.dataset.c, r2=+end.dataset.r, c2=+end.dataset.c;
  const dr=r2-r1, dc=c2-c1;
  if(!(dr===0 || dc===0 || Math.abs(dr)===Math.abs(dc))) return [start];
  const len=Math.max(Math.abs(dr),Math.abs(dc));
  const sr=Math.sign(dr), sc=Math.sign(dc), out=[];
  for(let i=0;i<=len;i++) out.push(cellAt(r1+sr*i, c1+sc*i));
  return out;
}

function clearSel(){ for(const el of boardEl.querySelectorAll(".cell.sel")) el.classList.remove("sel"); }
function startSel(el){ selecting=true; startCell=el; curCells=[el]; clearSel(); el.classList.add("sel"); }
function moveSel(el){
  if(!selecting || !el) return;
  curCells=lineCells(startCell, el);
  clearSel();
  for(const c of curCells) c.classList.add("sel");
}
function coordsKey(cells){ return cells.map(c=>c.dataset.r+","+c.dataset.c).join("|"); }
function placedKey(p){
  const a=[];
  for(let i=0;i<p.len;i++) a.push((p.r+p.dr*i)+","+(p.c+p.dc*i));
  return a.join("|");
}
function cancelSel(){ if(!selecting) return; selecting=false; clearSel(); }
function endSel(){
  if(!selecting) return;
  selecting=false;
  // 내용이 아니라 좌표(실제 배치 경로)로 매칭 → 우연한 채움글자 오인식 방지
  const key=coordsKey(curCells);
  const keyRev=coordsKey(curCells.slice().reverse());
  let hit=null, already=false;
  for(const p of placed){
    const k=placedKey(p);
    if(k!==key && k!==keyRev) continue;
    if(foundSet.has(p.word)){ already=true; continue; } // 같은 칸에 겹친 미발견 단어가 있을 수 있어 계속 탐색
    hit=p.word; break;
  }
  clearSel();
  if(hit) onFound(hit);
  else if(already){ /* 이미 찾은 단어 재드래그 → 무시 (콤보 유지) */ }
  else if(curCells.length>=2) onMiss();
}

/* ===== 점수 ===== */
function onFound(word){
  foundSet.add(word);
  combo++;
  const gained = word.length * 100 * combo;
  score += gained;
  if(score > best){ best = score; lsSet(bestKey(), String(best)); }
  showToast("+"+gained + (combo>=2 ? "  🔥x"+combo : ""));
  $("combo").classList.toggle("on", combo>=2);
  $("combo").textContent = combo>=2 ? ("🔥 x"+combo) : "";
  markFound();
  updateScore();
  updateStatus();
  checkWin();
}
function onMiss(){
  combo=0;
  $("combo").classList.remove("on");
  $("combo").textContent="";
  boardEl.classList.remove("miss"); void boardEl.offsetWidth; boardEl.classList.add("miss");
}
function showToast(t){
  toastEl.textContent=t;
  toastEl.classList.remove("fly"); void toastEl.offsetWidth; toastEl.classList.add("fly");
}
function updateScore(){
  $("score").textContent=score;
  $("best").textContent=best;
  if(combo<2){ $("combo").classList.remove("on"); $("combo").textContent=""; }
}

function markFound(){
  for(const p of placed){
    if(!foundSet.has(p.word)) continue;
    for(let i=0;i<p.len;i++) cellAt(p.r+p.dr*i, p.c+p.dc*i).classList.add("found");
  }
  for(const s of wordsEl.children) s.classList.toggle("done", foundSet.has(s.dataset.word));
}
function updateStatus(){ statusEl.textContent=`${foundSet.size} / ${WORDS.length} ${UI[lang].found}`; }

function checkWin(){
  if(WORDS.length===0 || foundSet.size!==WORDS.length) return;
  lsSet(clearedKey(level), "1");
  const u=UI[lang];
  const isLast = level>=TOTAL_LEVELS;
  $("win-title").textContent = isLast ? u.allclear : u.clear;
  $("win-score").textContent = `${u.finalScore}: ${score}`;
  $("next").style.display = isLast ? "none" : "";
  renderLevels();
  winEl.classList.add("show");
}

/* ===== UI 언어 ===== */
function applyUI(){
  const u=UI[lang];
  document.documentElement.lang=lang;
  $("title").textContent=u.title;
  $("sub").textContent=u.sub;
  $("lbl-score").textContent=u.score;
  $("lbl-best").textContent=u.best;
  $("newgame").textContent=u.newgame;
  $("lang").textContent=u.langBtn;
  $("again").textContent=u.again;
  $("next").textContent=u.next;
}

boardEl.addEventListener("mousedown", e=>{ if(e.button!==0) return; const el=e.target.closest(".cell"); if(el){ e.preventDefault(); startSel(el); } });
boardEl.addEventListener("contextmenu", e=>e.preventDefault());
window.addEventListener("mousemove", e=>{
  if(!selecting) return;
  if(e.buttons===0){ cancelSel(); return; }   // 창 밖에서 버튼을 떼 mouseup을 놓친 경우 복구
  moveSel(getCellFromPoint(e.clientX,e.clientY));
});
window.addEventListener("mouseup", e=>{ if(e.button===0) endSel(); });
window.addEventListener("blur", cancelSel);

let touchId=null;
boardEl.addEventListener("touchstart", e=>{
  if(selecting || e.touches.length>1) return;   // 드래그 중 추가 손가락/재진입 무시
  const t=e.changedTouches[0];
  const el=getCellFromPoint(t.clientX,t.clientY);
  if(el){ e.preventDefault(); touchId=t.identifier; startSel(el); }
}, {passive:false});
boardEl.addEventListener("touchmove", e=>{
  if(!selecting) return;
  const t=[...e.changedTouches].find(tt=>tt.identifier===touchId);
  if(!t) return;
  e.preventDefault();
  moveSel(getCellFromPoint(t.clientX,t.clientY));
}, {passive:false});
window.addEventListener("touchend", e=>{
  if(!selecting || touchId===null) return;
  if(![...e.changedTouches].some(tt=>tt.identifier===touchId)) return; // 추적 중인 손가락이 떼졌을 때만 확정
  touchId=null;
  endSel();
});
window.addEventListener("touchcancel", ()=>{ touchId=null; cancelSel(); });
window.addEventListener("resize", ()=>{ if(SIZE) setCellSize(); });

$("newgame").addEventListener("click", newGame);
$("again").addEventListener("click", newGame);
$("next").addEventListener("click", ()=>{ if(level<TOTAL_LEVELS){ level++; newGame(); } });
$("lang").addEventListener("click", ()=>{
  lang = lang==="ko" ? "en" : "ko";
  applyUI(); newGame();
});

applyUI();
newGame();
</script>
